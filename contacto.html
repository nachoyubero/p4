<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Buena Mesa - Contacto</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <p class="subtitulo">Restaurante</p>
        <h1>La Buena Mesa</h1>
        <div class="linea-decorativa"></div>
    </header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="carta.html">Carta</a>
        <a href="contacto.html">Contacto</a>
        <a href="carrito.html">Carrito</a>
    </nav>

    <main>
        <section class="seccion-centrada">
            <h2>Reserva tu Mesa</h2>
            <p>Rellena tus datos para confirmar la reserva.</p>

            <form action="#" method="post">
                <div class="campo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="campo">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>

                <div class="campo">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="612 345 678">
                </div>

                <div class="campo">
                    <label for="fecha-reserva">Fecha de reserva</label>
                    <input type="date" id="fecha-reserva" name="fecha-reserva" required>
                </div>

                <div class="campo">
                    <label for="hora">Hora</label>
                    <input type="time" id="hora" name="hora" required>
                </div>

                <div class="campo">
                    <label for="comensales">Número de comensales</label>
                    <input type="number" id="comensales" name="comensales" min="1" max="20" value="2">
                </div>

                <div class="campo">
                    <label for="notas">Notas especiales</label>
                    <textarea id="notas" name="notas" rows="4" placeholder="Alergias, preferencias..."></textarea>
                </div>

                <button type="submit">Confirmar Reserva</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 La Buena Mesa. Todos los derechos reservados.</p>
        <p>Si no se cancela con al menos 24 horas de antelación, se aplicará un cargo del 30% respecto al menú contratado.</p>
    </footer>
</body>

</html>
